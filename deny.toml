# cargo-deny — supply-chain gate (CI: `cargo deny check`).
#
# Strop sits on a large upstream tree (Zed's gpui, loro, wgpu), so this config
# distinguishes "things we chose" from "things we inherited and can't fix":
# vulnerabilities fail by default; unmaintained/yanked advisories — and, by
# explicit exception, a vulnerability that is purely transitive, has no safe
# upgrade, AND is unreachable in how we actually use the crate — are
# acknowledged by ID below, each with a note and a revisit date, so the gate
# stays green without hiding anything. Revisit whenever the gpui pin moves.

[advisories]
# Vulnerabilities and unsound advisories keep their default (deny). Yanked
# crates only warn: `swash 0.2.8` is yanked but is exactly the version
# gpui_wgpu pins (docs/UPSTREAM-gpui-scale-bug.md).
yanked = "warn"
ignore = [
    "RUSTSEC-2024-0436", # `paste` unmaintained — transitive (wgpu/naga)
    "RUSTSEC-2023-0089", # `atomic-polyfill` unmaintained — transitive
    "RUSTSEC-2026-0173", # `proc-macro-error2` unmaintained — transitive (gpui → stacksafe)
    # `ttf-parser` unmaintained — transitive (gpui → cosmic-text/usvg/fontdb/
    # rustybuzz); no safe upgrade (upstream's own move to `skrifa` is the only
    # fix). REVISIT by 2027-01, or sooner when the gpui pin moves.
    "RUSTSEC-2026-0192",
    # `quick-xml 0.39.4` DoS vulns (patched in 0.41) — the "explicit exception"
    # above. Purely transitive and UNREACHABLE as we use it: the only consumers
    # are `wayland-scanner` (parses TRUSTED build-time protocol XML, not runtime
    # input) and `zbus_xml` via accesskit (D-Bus a11y introspection on the local
    # session bus). No in-place upgrade: `wayland-scanner 0.31.10` caps quick-xml
    # at ^0.39 and the whole Wayland/accesskit stack is pinned by the gpui fork —
    # the real fix is bumping that stack in kirushik/zed. REVISIT by 2027-01, or
    # when the gpui pin next moves.
    "RUSTSEC-2026-0194", # quick-xml: quadratic runtime on duplicate attributes
    "RUSTSEC-2026-0195", # quick-xml: unbounded namespace-decl allocation (OOM)
]

[licenses]
# Permissive licenses present in the tree, plus GPL-3.0-or-later (Strop itself
# and the zlog/ztracing chain that forces the app's copyleft — see NOTICE).
# Dual-licensed crates (self_cell, r-efi, …) are satisfied by their permissive
# option, so the GPL-2.0/LGPL tokens they also carry need not be allowed.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MIT-0",
    "Unlicense",
    "NCSA",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "bzip2-1.0.6",
    "GPL-3.0-or-later",
]
confidence-threshold = 0.8
# First-party crates are GPL-3.0-or-later (allowed above anyway); don't gate them.
private = { ignore = true }

[bans]
# gpui's tree carries many duplicate versions; flag, don't fail.
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[sources.allow-org]
# gpui is pulled from a Strop fork of Zed's repo (github.com/kirushik/zed,
# pinned by rev — see the workspace Cargo.toml and docs/gpui-fork.md) and drags in
# several sibling Zed forks — wgpu, font-kit, xim-rs. Trust both the upstream
# org and the fork owner for git sources; any other git source still fails
# (unknown-git = "deny").
github = ["zed-industries", "kirushik"]
