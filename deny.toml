# cargo-deny — supply-chain gate (CI: `cargo deny check`).
#
# Strop sits on a large upstream tree (Zed's gpui, loro, wgpu), so this config
# distinguishes "things we chose" from "things we inherited and can't fix":
# vulnerabilities and yanked crates fail by default; unmaintained advisories — and, by
# explicit exception, a vulnerability that is purely transitive, has no safe
# upgrade, AND is unreachable in how we actually use the crate — are
# acknowledged by ID below, each with a note and a revisit date, so the gate
# stays green without hiding anything. Revisit whenever the gpui pin moves.

[advisories]
# Vulnerabilities, unsound advisories, and yanked crates are denied.
yanked = "deny"
ignore = [
    "RUSTSEC-2024-0436", # `paste` unmaintained — macOS-only, transitive (gpui → metal)
    "RUSTSEC-2023-0089", # `atomic-polyfill` unmaintained — transitive (loro → postcard defaults)
    "RUSTSEC-2026-0173", # `proc-macro-error2` unmaintained — transitive (gpui → stacksafe)
    # `ttf-parser` unmaintained — transitive (gpui_wgpu → cosmic-text → fontdb)
    # and a direct dev-dependency of shape_audit; no safe upgrade (an upstream
    # move to `skrifa` is the real fix). REVISIT by 2027-01, or sooner when the
    # gpui text stack moves.
    "RUSTSEC-2026-0192",
    # `rustybuzz` unmaintained — transitive (gpui → usvg/resvg); the maintainer
    # points to `harfrust` as the successor, but the migration is usvg's (and
    # thus upstream Zed's) to make; no safe upgrade from here. REVISIT by
    # 2027-01, or sooner when the gpui pin moves.
    "RUSTSEC-2026-0206",
    # `quick-xml 0.39.4` DoS vulns (patched in 0.41) — the "explicit exception"
    # above. Purely transitive and not exposed to documents or remote network
    # input: `wayland-scanner` parses trusted build-time protocol XML, while
    # `zbus_xml` via accesskit parses introspection from peers on the local D-Bus
    # session. No in-place upgrade: both consumers cap quick-xml below 0.41; the
    # real fix is bumping that stack in kirushik/zed. REVISIT by 2027-01, or when
    # the gpui Wayland/accessibility stack next moves.
    "RUSTSEC-2026-0194", # quick-xml: quadratic runtime on duplicate attributes
    "RUSTSEC-2026-0195", # quick-xml: unbounded namespace-decl allocation (OOM)
    # `bincode 1.3.3` unmaintained — the team ceased development and declared
    # 1.3.3 complete. `hyphenation` uses it at runtime to load only Strop's
    # trusted, packaged dictionaries; no document or other attacker-controlled
    # input reaches it. No upgrade exists. REVISIT if hyphenation moves off
    # bincode.
    "RUSTSEC-2025-0141",
]

[licenses]
# Permissive licenses present in the tree, plus GPL-3.0-or-later (Strop itself
# and the zlog/ztracing chain that forces the app's copyleft — see NOTICE).
# Dual-licensed crates (self_cell, r-efi, …) are satisfied by their permissive
# option, so the GPL-2.0/LGPL tokens they also carry need not be allowed.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MIT-0",
    "Unlicense",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "bzip2-1.0.6",
    "GPL-3.0-or-later",
]
confidence-threshold = 0.8
# First-party crates are GPL-3.0-or-later (allowed above anyway); don't gate them.
private = { ignore = true }

[bans]
# gpui's tree carries many duplicate versions; flag, don't fail.
multiple-versions = "warn"
# First-party registry dependencies must always carry an explicit version.
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    # gpui's `test-support` feature uses Zed's revision-pinned proptest fork.
    "https://github.com/proptest-rs/proptest",
]

[sources.allow-org]
# gpui is pulled from a Strop fork of Zed's repo (github.com/kirushik/zed,
# pinned by rev — see the workspace Cargo.toml and docs/gpui-fork.md) and drags in
# several sibling Zed forks — wgpu, font-kit, xim-rs. Trust both the upstream
# org and the fork owner for git sources; any other git source still fails
# (unknown-git = "deny").
github = ["zed-industries", "kirushik"]
