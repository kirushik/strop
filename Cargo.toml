[workspace]
resolver = "2"
members = ["crates/strop-core", "crates/strop-app"]

[workspace.package]
version = "0.0.1"
edition = "2024"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
strop-core = { path = "crates/strop-core" }
ropey = "1.6"
loro = "1"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
pulldown-cmark = { version = "0.13", default-features = false }
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp", "gif", "bmp", "tiff", "rayon"] }
blake3 = "1.8"
toml = "0.8"
ureq = { version = "3", features = ["json"] }
similar = { version = "2", features = ["unicode", "inline"] }
glob = "0.3"

# Vendored 0.2.2 (crates.io's last-ever gpui release) with upstream text
# fixes backported — see vendor/gpui/STROP-PATCHES.md. The long-term path is
# still a git pin on zed-industries/zed (post gpui/gpui_platform split).
# X11 backend off: dev machine lacks libxkbcommon-x11 dev files and runs
# Wayland; re-enable "x11" when packaging for distribution.
gpui = { path = "vendor/gpui", default-features = false, features = ["font-kit", "wayland"] }

[profile.dev]
# gpui is a huge dep tree; keep its codegen optimized even in dev builds
opt-level = 1

[profile.dev.package."*"]
opt-level = 2
