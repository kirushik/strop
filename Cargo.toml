[workspace]
resolver = "2"
members = ["crates/strop-core", "crates/strop-app"]

[workspace.package]
version = "0.1.1"
edition = "2024"
license = "GPL-3.0-or-later"

[workspace.dependencies]
strop-core = { path = "crates/strop-core" }
ropey = "1.6"
loro = "1"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
pulldown-cmark = { version = "0.13", default-features = false }
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp", "gif", "bmp", "tiff", "rayon"] }
blake3 = "1.8"
toml = "1"
toml_edit = "0.25"
ureq = { version = "3", features = ["json"] }
similar = { version = "3", features = ["unicode", "inline"] }
glob = "0.3"

# Pinned to a FORK of zed-industries/zed — github.com/kirushik/zed, branch
# `strop-patches` — based at upstream rev 992f395c (tag v0.233.10, 2026-04-24)
# plus two local fixes that have to live INSIDE the gpui tree. The fork is
# byte-identical to that upstream rev except those two commits, so it costs
# nothing over a plain pin while keeping every gpui-tree change as one source of
# truth (the fork commits ARE the patches — no copy in-tree to drift) and no
# vendored crate. docs/gpui-fork.md has the branch, the per-commit links and the
# re-sync recipe. Both fixes are headed upstream as separate PRs; point back at
# zed-industries/zed once they land.
#   - gpui_windows: layout-independent letter keys, so Ctrl+Shift+P (and every
#     letter chord) fires under non-Latin keyboard layouts (Cyrillic, …).
#   - gpui_wgpu: a fresh swash ScaleContext per glyph — the Wayland
#     scale-change glyph corruption (docs/UPSTREAM-gpui-scale-bug.md), formerly
#     carried as vendor/gpui_wgpu + a [patch] override (both now removed).
# Upstream carries the 2026 Linux raster rewrite (wgpu + cosmic-text) and
# per-span font-fallback. Apps need both the `gpui` facade and `gpui_platform`
# (selects gpui_linux/gpui_wgpu on Linux): `Application::new()` became
# `gpui_platform::application()`. X11 kept on for distribution packaging.
gpui = { git = "https://github.com/kirushik/zed", rev = "f3f236eb58663cf0e43f866be3d25833918c4452", default-features = false, features = ["font-kit", "wayland", "x11"] }
gpui_platform = { git = "https://github.com/kirushik/zed", rev = "f3f236eb58663cf0e43f866be3d25833918c4452", default-features = false, features = ["wayland", "x11"] }

[profile.dev]
# gpui is a huge dep tree; keep its codegen optimized even in dev builds
opt-level = 1

[profile.dev.package."*"]
opt-level = 2
