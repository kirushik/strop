[workspace]
resolver = "2"
members = ["crates/strop-core", "crates/strop-app"]

[workspace.package]
version = "0.0.1"
edition = "2024"
license = "GPL-3.0-or-later"

[workspace.dependencies]
strop-core = { path = "crates/strop-core" }
ropey = "1.6"
loro = "1"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
pulldown-cmark = { version = "0.13", default-features = false }
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp", "gif", "bmp", "tiff", "rayon"] }
blake3 = "1.8"
toml = "0.8"
toml_edit = "0.22"
ureq = { version = "3", features = ["json"] }
similar = { version = "2", features = ["unicode", "inline"] }
glob = "0.3"

# Git pin on zed-industries/zed (post gpui/gpui_platform split), tag
# v0.233.10 (2026-04-24). Carries the 2026 Linux raster rewrite (wgpu +
# cosmic-text) and per-span font-fallback wiring that the vendored 0.2.2
# only hotpatched around (vendor/gpui kept untouched until this lands).
# Apps now need both the `gpui` facade and `gpui_platform` (which selects
# gpui_linux/gpui_wgpu on Linux): `Application::new()` became
# `gpui_platform::application()`.
# X11 backend off: Wayland-only dev machine; re-enable "x11" (on
# gpui_platform) when packaging for distribution.
gpui = { git = "https://github.com/zed-industries/zed", rev = "992f395c3d696d96946302cd0a8721a72954ba39", default-features = false, features = ["font-kit", "wayland", "x11"] }
gpui_platform = { git = "https://github.com/zed-industries/zed", rev = "992f395c3d696d96946302cd0a8721a72954ba39", default-features = false, features = ["wayland", "x11"] }

[profile.dev]
# gpui is a huge dep tree; keep its codegen optimized even in dev builds
opt-level = 1

[profile.dev.package."*"]
opt-level = 2

# Workaround for the Wayland scale-change glyph corruption
# (docs/UPSTREAM-gpui-scale-bug.md): gpui_wgpu vendored with a one-change
# patch in cosmic_text_system.rs (fresh swash ScaleContext per glyph
# rasterization). Everything else still comes from the zed git pin above.
# Remove vendor/gpui_wgpu and this [patch] once fixed upstream.
[patch."https://github.com/zed-industries/zed"]
gpui_wgpu = { path = "vendor/gpui_wgpu" }
