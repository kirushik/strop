<!-- Pictorial family, the one filled form: the solid dropdown wedge.
     Authored on the 9px display grid; the top edge lies on an integer
     pixel row (crisp), the two descending edges anti-alias as diagonals
     should. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 9 9" fill="#000" stroke="none">
  <path d="M1 2.5h7L4.5 7z"/>
</svg>
