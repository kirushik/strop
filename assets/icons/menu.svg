<!-- Pictorial family. The hamburger. Authored on the 13px display grid
     (1 unit = 1 logical px): bars are 1px strokes centered on half-pixel
     rows, so both edges land on device-pixel boundaries at 1x and 2x —
     the pixel-honesty rule of docs/iconography.md. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 13 13" fill="none" stroke="#000" stroke-width="1" stroke-linecap="round">
  <path d="M1.5 3.5h10"/>
  <path d="M1.5 6.5h10"/>
  <path d="M1.5 9.5h10"/>
</svg>
