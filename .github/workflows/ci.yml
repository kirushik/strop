# Strop CI.
#
# Gating jobs — required for a merge, via the `ci-success` aggregator below:
#   core — strop-core: clippy -D warnings + the property suite at an elevated
#          PROPTEST_CASES. Fast, dependency-light, the reliable gate.
#   app  — strop-app on Linux: builds the git-pinned gpui (wgpu + Wayland),
#          clippy, and the headless logic tests.
#   deny — cargo-deny: licenses, advisories, and git sources (deny.toml).
#
# Informational jobs — continue-on-error, they NEVER block a merge. They exist
# for the feedback loop we can't get locally (no Mac/Windows hardware):
#   macos   — build + a launch smoke.
#   windows — build + tests (single_instance over named pipes) + launch smoke.
# Promote either into the required set (drop continue-on-error and add it to
# `ci-success.needs`) once it is reliably green.
#
# The toolchain version is pinned in rust-toolchain.toml; rustup honours it in
# the repo dir, so the cache key stays stable across upstream stable releases.
#
# Deliberately NO `cargo fmt --check`: this repo is hand-formatted, not
# rustfmt-canonical, so a format gate would fail on untouched code.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A new push to the same ref cancels superseded, still-running jobs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: read-only by default. No job here writes to the repo.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    name: core engine — clippy + property tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: core
      - name: clippy (warnings denied)
        run: cargo clippy -p strop-core --all-targets -- -D warnings
      - name: tests (elevated proptest cases)
        env:
          # The harness (tests/model.rs, tests/robustness.rs) reads this; the
          # bug-hunt pass validated green at 4096 in ~1.5s, so 2048 per push is
          # cheap insurance against boundary regressions the default 256 misses.
          PROPTEST_CASES: "2048"
        run: cargo test -p strop-core

  deny:
    name: supply chain — cargo-deny (licenses, advisories, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  app:
    name: app shell — clippy + headless logic tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: gpui system dependencies (Zed Linux build reqs)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libvulkan-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libfontconfig-dev \
            libssl-dev \
            libxcb1-dev \
            libx11-dev \
            libxext-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: app
      - name: clippy (warnings denied)
        run: cargo clippy -p strop-app --all-targets -- -D warnings
      - name: tests (headless — pure-logic helpers open no window)
        run: cargo test -p strop-app

  macos:
    # Informational while macOS is brought up: `continue-on-error` means a red
    # here never blocks a merge — it's a porting TODO, not a broken build. The
    # value is the feedback loop we otherwise can't get (no Mac hardware). Drop
    # `continue-on-error` and add this to `ci-success.needs` once it is reliably
    # green. gpui selects its Metal backend (gpui_macos) here; the vendored
    # gpui_wgpu patch is Linux-only, so an "unused patch" warning is expected.
    name: macOS — build + launch smoke (informational)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos
      - name: build (debug)
        run: cargo build -p strop-app
      - name: launch smoke — open a window, run a scripted session, exit 0
        run: |
          set +e
          # Tier-1 liveness: with no file and no STROP_SMOKE_HOLD the app opens
          # a window over the built-in sample, replays a few caret motions, and
          # quits on its own (smoke.rs). We watchdog it by hand — macOS has no
          # `timeout(1)` — so a hung WindowServer/Metal init can't wedge the job.
          STROP_SMOKE="down down up right left" ./target/debug/strop &
          PID=$!
          for _ in $(seq 1 60); do
            kill -0 "$PID" 2>/dev/null || break
            sleep 1
          done
          if kill -0 "$PID" 2>/dev/null; then
            echo "::warning::smoke still alive after 60s — killing (window/Metal init likely hung on the runner)"
            kill "$PID" 2>/dev/null
            exit 1
          fi
          wait "$PID"
          code=$?
          echo "smoke exit code: $code"
          exit $code

  windows:
    # Informational while Windows is brought up (continue-on-error): never gates
    # a merge. Unlike macOS this also runs `cargo test` — the single_instance
    # suite exercises the *named-pipe* IPC path here, so a green run is real
    # cross-platform verification of the rendezvous logic, not just a compile.
    name: Windows — build + tests + launch smoke (informational)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows
      - name: build (debug)
        run: cargo build -p strop-app
      - name: tests (headless — incl. single_instance over named pipes)
        run: cargo test -p strop-app
      - name: launch smoke — open a window, run a scripted session, exit 0
        shell: bash
        run: |
          set +e
          # Same Tier-1 liveness as macOS, via Git Bash so the watchdog is
          # portable. wgpu picks DX12 (or the WARP software fallback) here.
          STROP_SMOKE="down down up right left" ./target/debug/strop.exe &
          PID=$!
          for _ in $(seq 1 60); do
            kill -0 "$PID" 2>/dev/null || break
            sleep 1
          done
          if kill -0 "$PID" 2>/dev/null; then
            echo "::warning::smoke still alive after 60s — killing (window/D3D init likely hung on the runner)"
            kill "$PID" 2>/dev/null
            exit 1
          fi
          wait "$PID"
          code=$?
          echo "smoke exit code: $code"
          exit $code

  ci-success:
    # The single required status check for branch protection. It needs only the
    # gating jobs; the macOS/Windows legs are intentionally absent so they can
    # never block. `if: always()` + explicit result checks avoid the classic
    # trap where a skipped dependency leaves a "required" check pending forever.
    name: CI passed
    needs: [core, app, deny]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: require core, app, and deny to have succeeded
        run: |
          ok=true
          for r in "core=${{ needs.core.result }}" \
                   "app=${{ needs.app.result }}" \
                   "deny=${{ needs.deny.result }}"; do
            echo "$r"
            case "$r" in *=success) ;; *) ok=false ;; esac
          done
          $ok
