name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libwayland-dev libxkbcommon-dev libxkbcommon-x11-dev libvulkan-dev libgbm-dev libgl1-mesa-dev libasound2-dev libfontconfig-dev libssl-dev libxcb1-dev libx11-dev libxext-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { key: release-linux }
      - name: install pinned packagers
        run: |
          cargo install cargo-deb --version 3.7.0 --locked
          cargo install cargo-generate-rpm --version 0.21.0 --locked
      - name: stage 1 — build channels and construct final Linux payloads
        shell: bash
        run: |
          ver=${GITHUB_REF_NAME#v}; [[ "${{ github.event_name }}" == workflow_dispatch ]] && ver=dev
          cargo run --locked -p xtask -- icons
          STROP_DIST_CHANNEL=github-linux cargo build --profile dist --locked --target x86_64-unknown-linux-gnu -p strop-app
          strip --strip-all target/x86_64-unknown-linux-gnu/dist/strop
          n=strop-$ver-x86_64-unknown-linux-gnu; mkdir -p dist/$n
          cp target/x86_64-unknown-linux-gnu/dist/strop README.md COPYING NOTICE dist/$n/
          tar -C dist -czf dist/$n.tar.gz $n
          STROP_DIST_CHANNEL=deb cargo build --profile dist --locked --target x86_64-unknown-linux-gnu -p strop-app
          STROP_DIST_CHANNEL=deb cargo deb -p strop-app --profile dist --target x86_64-unknown-linux-gnu --no-build
          cp target/x86_64-unknown-linux-gnu/debian/*.deb dist/
          STROP_DIST_CHANNEL=rpm cargo build --profile dist --locked --target x86_64-unknown-linux-gnu -p strop-app
          cargo generate-rpm -p crates/strop-app --target x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-gnu/generate-rpm/*.rpm dist/
      - uses: actions/upload-artifact@v7
        with: { name: linux, path: "dist/*", if-no-files-found: error }

  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: aarch64-apple-darwin }
      - uses: Swatinem/rust-cache@v2
        with: { key: release-mac }
      - name: import signing certificate
        if: vars.MACOS_SIGNING_ENABLED == 'true'
        env:
          P12: ${{ secrets.MACOS_CERT_P12 }}
          PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
          NOTARY_COMPLETE: ${{ secrets.APPLE_API_KEY != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_KEY_ISSUER != '' }}
        run: |
          # Signing enabled means notarization too — a Developer-ID-signed but
          # unnotarized app is rejected by Gatekeeper, so an incomplete secret
          # set must fail here, before the build, not silently skip stapling.
          [[ "$NOTARY_COMPLETE" == "true" ]] || { echo "MACOS_SIGNING_ENABLED is true but APPLE_API_KEY / _KEY_ID / _KEY_ISSUER are incomplete" >&2; exit 1; }
          echo "$P12" | base64 --decode > cert.p12
          security create-keychain -p ci build.keychain
          security import cert.p12 -k build.keychain -P "$PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain
          security unlock-keychain -p ci build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k ci build.keychain
          identity=$(security find-identity -v -p codesigning build.keychain | sed -n '1s/.*"\(.*\)"/\1/p')
          # Signing is enabled, so an unusable certificate must fail the job
          # here — an empty identity would otherwise fall through bundle-mac.sh
          # and ship an ad-hoc-signed artifact under a green build.
          [[ -n "$identity" ]] || { echo "no valid codesigning identity in the imported .p12 (missing intermediate chain?)" >&2; security find-identity -p codesigning build.keychain >&2; exit 1; }
          echo "MACOS_SIGN_IDENTITY=$identity" >> "$GITHUB_ENV"
      - name: stage 1-4 — build, sign, bundle, notarize, and staple
        env:
          APPLE_API_KEY: ${{ vars.MACOS_SIGNING_ENABLED == 'true' && secrets.APPLE_API_KEY || '' }}
          APPLE_API_KEY_ID: ${{ vars.MACOS_SIGNING_ENABLED == 'true' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ vars.MACOS_SIGNING_ENABLED == 'true' && secrets.APPLE_API_KEY_ISSUER || '' }}
        run: |
          ver=${GITHUB_REF_NAME#v}; [[ "${{ github.event_name }}" == workflow_dispatch ]] && ver=dev
          cargo run --locked -p xtask -- icons
          STROP_DIST_CHANNEL=github-mac cargo build --profile dist --locked --target aarch64-apple-darwin -p strop-app
          strip target/aarch64-apple-darwin/dist/strop
          bash script/bundle-mac.sh target/aarch64-apple-darwin/dist/strop "$ver" dist packaging/macos/entitlements.plist
          rm -rf dist/dmg-root dist/Strop.app dist/*-notary.zip
      - uses: actions/upload-artifact@v7
        with: { name: mac, path: "dist/*", if-no-files-found: error }

  windows:
    runs-on: windows-latest
    steps:
      - name: exclude build dirs from Defender
        shell: pwsh
        run: foreach ($p in @($env:GITHUB_WORKSPACE, "$env:USERPROFILE\.cargo", "$env:USERPROFILE\.rustup")) { try { Add-MpPreference -ExclusionPath $p -ErrorAction Stop } catch { Write-Warning $_ } }
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { key: release-windows }
      - name: stage 1 — two channel builds
        shell: bash
        run: |
          ver=${GITHUB_REF_NAME#v}; [[ "${{ github.event_name }}" == workflow_dispatch ]] && ver=dev
          cargo run --locked -p xtask -- icons
          STROP_DIST_CHANNEL=github-win cargo build --profile dist --locked --target x86_64-pc-windows-msvc -p strop-app
          mkdir dist; cp target/x86_64-pc-windows-msvc/dist/strop.exe dist/strop-$ver-x86_64-pc-windows-msvc.exe
          STROP_DIST_CHANNEL=github-win-portable cargo build --profile dist --locked --target x86_64-pc-windows-msvc -p strop-app
          mkdir portable; cp target/x86_64-pc-windows-msvc/dist/strop.exe README.md COPYING NOTICE portable/
          7z a dist/strop-$ver-x86_64-pc-windows-msvc-portable.zip ./portable/* >/dev/null
          echo "VER=$ver" >> "$GITHUB_ENV"
      - name: stage 2 — optional SignPath/Azure inner EXE signing
        if: vars.WINDOWS_SIGNING_ENABLED == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: strop
          signing-policy-slug: release-signing
          artifact-configuration-slug: windows-exe
          input-artifact-path: dist/strop-${{ env.VER }}-x86_64-pc-windows-msvc.exe
          output-artifact-directory: dist/signed
      - name: stage 3 — construct installer around final inner EXE
        shell: pwsh
        run: |
          $exe = "dist/strop-$env:VER-x86_64-pc-windows-msvc.exe"
          if (Test-Path dist/signed) {
            $signed = Get-ChildItem dist/signed -Filter *.exe | Select-Object -First 1
            if (-not $signed) { throw "signing produced no inner executable" }
            Copy-Item $signed.FullName $exe -Force
            Remove-Item dist/signed -Recurse -Force
          }
          $env:STROP_VERSION=$env:VER; $env:STROP_EXE=(Resolve-Path $exe); $env:STROP_OUTPUT=(Resolve-Path dist)
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\windows\strop.iss
      - name: stage 4 — optional installer signing
        if: vars.WINDOWS_SIGNING_ENABLED == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: strop
          signing-policy-slug: release-signing
          artifact-configuration-slug: windows-installer
          input-artifact-path: dist/strop-${{ env.VER }}-x86_64-windows-installer.exe
          output-artifact-directory: dist/signed-installer
      - name: promote signed installer to its final asset name
        if: vars.WINDOWS_SIGNING_ENABLED == 'true'
        shell: pwsh
        run: |
          $signed = Get-ChildItem dist/signed-installer -Filter *.exe | Select-Object -First 1
          if (-not $signed) { throw "signing produced no installer" }
          Copy-Item $signed.FullName "dist/strop-$env:VER-x86_64-windows-installer.exe" -Force
          Remove-Item dist/signed-installer -Recurse -Force
      - uses: actions/upload-artifact@v7
        with: { name: windows, path: "dist/*", if-no-files-found: error }

  draft:
    needs: [linux, mac, windows]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v8
        with: { path: artifacts, merge-multiple: true }
      - name: stage 5 — upload immutable payloads into a draft
        uses: softprops/action-gh-release@v3
        with:
          name: Strop ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/**/*
          body: |
            > **Install note.** These binaries are built and uploaded straight
            > from tagged CI, each carrying a verifiable [build-provenance
            > attestation](https://github.com/kirushik/strop/attestations). When
            > a platform is not OS-code-signed, Windows SmartScreen shows an
            > unknown-publisher prompt (choose *More info → Run anyway*) and
            > macOS Gatekeeper needs a manual override — expected, not a
            > compromise. Updates verify against Strop's own embedded key
            > regardless of OS signing. Linux is the primary runtime-tested
            > platform.

  manifest:
    needs: draft
    runs-on: ubuntu-latest
    permissions: { contents: write, id-token: write, attestations: write }
    steps:
      - uses: actions/checkout@v7
      - name: stage 6 — download draft bytes and emit the exact manifest
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          ver=${GITHUB_REF_NAME#v}; mkdir assets
          gh release download "$GITHUB_REF_NAME" --dir assets
          win=strop-$ver-x86_64-pc-windows-msvc.exe
          mac=strop-$ver-aarch64-apple-darwin-app.tar.gz
          # Deployed clients hard-refuse artifacts over 256 MiB and manifests
          # over 1 MiB (MAX_ARTIFACT_SIZE / MANIFEST_LIMIT in update/mod.rs).
          # A release that outgrows the caps would strand every installed
          # client on its current version — fail the pipeline instead.
          for f in "$win" "$mac"; do
            size=$(stat -c %s "assets/$f")
            (( size > 0 && size <= 256*1024*1024 )) || { echo "$f is $size bytes — outside the clients' (0, 256 MiB] cap" >&2; exit 1; }
          done
          entry() { jq -n --arg url "https://github.com/kirushik/strop/releases/download/$GITHUB_REF_NAME/$1" --arg hash "$(sha256sum "assets/$1"|cut -d' ' -f1)" --argjson size "$(stat -c %s "assets/$1")" '{url:$url,sha256:$hash,size:$size}'; }
          jq -n --arg version "$ver" --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --arg notes "https://github.com/kirushik/strop/releases/tag/$GITHUB_REF_NAME" --argjson win "$(entry "$win")" --argjson mac "$(entry "$mac")" '{product:"strop",updater_protocol:1,version:$version,pub_date:$date,notes_url:$notes,targets:{"github-win/x86_64-pc-windows-msvc/exe":$win,"github-mac/aarch64-apple-darwin/app-tar":$mac}}' > assets/latest.json
          (( $(stat -c %s assets/latest.json) <= 1024*1024 )) || { echo "latest.json exceeds the clients' 1 MiB manifest cap" >&2; exit 1; }
          gh release upload "$GITHUB_REF_NAME" assets/latest.json
      - name: stage 7 — attest only immutable final payloads
        uses: actions/attest-build-provenance@v4
        with: { subject-path: "assets/*" }
