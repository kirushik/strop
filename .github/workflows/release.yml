# Strop release builds.
#
# Trigger: push a `v*` tag (e.g. `v0.1.0`). Builds the `dist` profile binary
# (thin LTO + codegen-units=1 + full strip — see Cargo.toml) on each of the three
# CI platforms, packages it with its license files, and attaches the archives to
# a GitHub Release created as a DRAFT — nothing is published until a human reviews
# and hits publish.
#
# `workflow_dispatch` runs the build matrix WITHOUT creating a release, so the
# three dist builds (which ci.yml never exercises — it builds debug) can be
# dry-run on a branch before a tag is ever cut.
#
# Honesty for the early releases: only Linux is runtime-tested. The macOS and
# Windows binaries build and pass a headless launch smoke (ci.yml) but are
# otherwise unverified, and they are UNSIGNED — Gatekeeper / SmartScreen will
# warn, and users must clear quarantine by hand. The release body says so.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Read-only by default; the release job opts into contents:write locally.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: strop
          - os: macos-latest # Apple Silicon runner
            target: aarch64-apple-darwin
            bin: strop
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: strop.exe
    steps:
      - uses: actions/checkout@v6
      - name: exclude build dirs from Defender (Windows build speedup)
        # The dist build (thin LTO + cg=1) is the slowest leg; Defender scanning
        # every compiler artifact drags it further. Exclude the build dirs.
        # Non-fatal — see the matching note in ci.yml.
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          foreach ($p in @($env:GITHUB_WORKSPACE, "$env:USERPROFILE\.cargo", "$env:USERPROFILE\.rustup")) {
            try   { Add-MpPreference -ExclusionPath $p -ErrorAction Stop; Write-Host "excluded $p" }
            catch { Write-Host "::warning::could not exclude $p from Defender: $_" }
          }
      - name: gpui system dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libvulkan-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libfontconfig-dev \
            libssl-dev \
            libxcb1-dev \
            libx11-dev \
            libxext-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      - name: build (dist)
        # Build the exact matrix triple so the artifact label is true by
        # construction (not an assumption about the runner's host arch), and
        # --locked so the published binary matches the committed Cargo.lock.
        # `dist` profile = thin LTO + codegen-units=1 + strip (see Cargo.toml):
        # spend CI compile time once for a smaller, faster download-and-run binary.
        run: cargo build --profile dist --locked --target ${{ matrix.target }} -p strop-app
      - name: strip symbol table
        # `strip=symbols` in the profile drops debuginfo but leaves the static
        # symbol table (.symtab/.strtab ~5 MB here); a full strip removes it.
        # Per-OS because the tools differ:
        #   Linux  — GNU binutils: `strip --strip-all`.
        #   macOS  — cctools strip has NO `--strip-all` (and its `-s` means
        #            something else); bare `strip` IS the full strip for an
        #            executable. It also invalidates the linker's ad-hoc
        #            signature, so re-sign — Apple Silicon won't launch an
        #            unsigned/altered binary.
        #   Windows — skipped: MSVC keeps symbols in a separate .pdb, not the .exe.
        if: runner.os != 'Windows'
        shell: bash
        run: |
          f="target/${{ matrix.target }}/dist/${{ matrix.bin }}"
          if [ "${{ runner.os }}" = "macOS" ]; then
            strip "$f"
            codesign --force --sign - "$f"
          else
            strip --strip-all "$f"
          fi
      - name: package
        shell: bash
        run: |
          # Version from the tag (v0.1.0 -> 0.1.0); "dev" for a dispatch dry-run.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ver="dev"
          else
            ver="${GITHUB_REF_NAME#v}"
          fi
          name="strop-${ver}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/dist/${{ matrix.bin }}" "dist/$name/"
          # GPL: convey the licence and notices with the binary.
          cp README.md COPYING NOTICE "dist/$name/"
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "$name.zip" "$name" >/dev/null
            echo "ASSET=dist/$name.zip" >> "$GITHUB_ENV"
          else
            tar czf "$name.tar.gz" "$name"
            echo "ASSET=dist/$name.tar.gz" >> "$GITHUB_ENV"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: strop-${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: create draft GitHub Release
    needs: build
    # Tag pushes only — a dispatch run stops after building artifacts.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: create draft release
        uses: softprops/action-gh-release@v2
        with:
          name: Strop ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/**/*
          body: |
            > **Early release.** Only **Linux (Wayland)** is runtime-tested.
            > The **macOS** and **Windows** binaries build and pass a headless
            > launch smoke, but are otherwise unverified — and **unsigned**, so
            > Gatekeeper (macOS) and SmartScreen (Windows) will warn. On macOS,
            > clear quarantine with `xattr -d com.apple.quarantine ./strop`.
            >
            > Building from source is the supported path — see
            > [DEVELOPMENT.md](https://github.com/kirushik/strop/blob/main/DEVELOPMENT.md).
            > The Linux binary is dynamically linked against the gpui system
            > libraries listed there (Wayland, Vulkan, fontconfig, …).

            ---
